# Cafeteria Lite Professional - GitHub Actions CI/CD Pipeline

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  SERVICE_NAME: cafeteria-lite-api-staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run linter
        working-directory: backend
        run: npm run lint || true

      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage || true

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Build and push Docker image
        run: |
          gcloud builds submit backend --tag gcr.io/$GCP_PROJECT_ID/cafeteria-lite-api:latest \
            --tag gcr.io/$GCP_PROJECT_ID/cafeteria-lite-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$GCP_PROJECT_ID/cafeteria-lite-api:latest \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=staging,ENVIRONMENT=staging
